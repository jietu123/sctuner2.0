paths:
  sc_expr: unused
  sc_meta: unused
  st_expr: unused
  st_meta: unused
qc:
  sc_min_genes: 0
  sc_max_genes: 100000
  sc_max_mt: 100
  st_min_genes: 0
  st_max_genes: Inf
  st_max_mt: 100
  hvg_nfeatures: 2000
  mt_pattern: ^(MT-|mt-)
gene_filter:
  min_cells_sc: 0
  min_cells_st: 0
stage3:
  strong_th: 0.7
  weak_th: 0.4
  unknown_floor: 0.3
  plugin_genes_path: data/processed/cytospace_fig2k_breast_state_decoy_stage3_detected/stage1_preprocess/hvg_genes.txt
  mismatch_action: mark_unknown
  auto_missing_detection:
    enable: true
    method: adaptive_low_support
    min_cells: 50
    robust_z_th: -1.2
    soft_z_th: -0.6
    require_masked_for_soft: false
    require_masked_for_hard: false
    max_fraction_types: 0.5
    max_types: 2
    action: mark_unknown
    require_confirmation: false
  masked_missing_detection:
    enable: false
  marker_identity_diagnostics:
    enable: true
    marker_top_n: 80
    min_identity_markers: 5
    min_all_specificity: 1.2
    min_neighbor_specificity: 1.1
    min_marker_type_mean: 0.001
    min_marker_st_detect_frac: 0.005
    st_presence_quantile: 0.9
    depleted_z_th: -0.9
