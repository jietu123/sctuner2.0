stage3:
  abstain_unknown_sc_only: true
  alpha: 0.1
  apply_mismatch_to_relabel: true
  drop_unknown: true
  protect_strong_from_missing: true
  enable_mismatch_detection: true
  fallback_specificity_mode: mean
  fallback_specificity_types:
  - Dendritic cells
  marker_gene_count: 12
  marker_specificity_mode: max
  marker_specificity_mode_overrides: NK cells=mean,PCs=mean
  min_effect_size: 0.15
  min_marker_genes: 5
  min_marker_genes_overrides: T cells CD8=2
  min_marker_specificity: 1.4
  min_marker_specificity_overrides: T cells CD8=3.0
  mismatch_action: mark_unknown
  multiple_test_correction: BH
  score_method: fisher_z
  strong_th: 0.8
  support_threshold: 1.8500000000000016
  use_permutation_test: true
  weak_th: 0.5
  z_score_aggregation: topk_mean
  z_topk: 200
  V5_denoising:
    enable: true
    p_value_upper_limit: 0.2
    max_pruning_ratio: 0.3
    min_markers_left: 10
  V5_niche_rescue:
    enable: true
    anchor_p_threshold: 0.01
    correlation_metric: spearman
    correlation_threshold: 0.35
  V5_entropy_qc:
    enable: true
    entropy_threshold: 0.95
    temperature: 1.5
  V5_rescue_control:
    enable: true
    prior_weight: 0.2
stage4:
  filter_to_sim_truth: false

stage6:
  version: 4
  expr_source:
    kind: "csv"
    path: data/processed/real_brca_simS0_seed0/stage1_preprocess/exported/st_expression_normalized.csv
    transform: "none"
  expr_candidates:
    - data/processed/real_brca_simS0_seed0/stage1_preprocess/exported/st_expression_lognorm.csv
    - data/processed/real_brca_simS0_seed0/stage1_preprocess/exported/st_expression_counts.csv
  test:
    method: "spearman_corr + top_bottom"
    top_quantile: 0.2
    bottom_quantile: 0.2
    min_spots: 200
  filters:
    detect_rate_min: 0.05
    x_var_min: 1e-12
    y_var_min: 1e-12
  strength_gate:
    strength_rho_min: 0.1
    strength_effect_min: 0.15
    min_strong_tests: 6
  direction_gate:
    ok_fraction_pass: 0.6
    ok_fraction_fail: 0.5
  reconstruction:
    gene_set: "st_hvg2000"
    n_genes: 2000
    null_shuffle: 50
    corr_delta_min: 0.05
    rmse_delta_min: 0.05
    expr_layer_prefer: "lognorm"
  compartments:
    n_genes_per_compartment: 200
    detect_rate_min: 0.05
    smoothing_k: 6
    smoothing_alpha: 0.5
    mapping:
      - name: "immune_total"
        types: ["T cells CD4", "T cells CD8", "Monocytes and Macrophages", "NK cells", "B cells", "Dendritic cells", "PCs"]
        markers: ["PTPRC", "TRAC", "LST1"]
      - name: "epithelial"
        types: ["Epithelial cells"]
        markers: ["EPCAM", "KRT19"]
      - name: "stromal"
        types: ["Fibroblasts"]
        markers: ["COL1A1", "COL1A2"]
      - name: "endothelial"
        types: ["Endothelial cells"]
        markers: ["VWF", "KDR"]
  composites:
    - name: "immune_total"
      sum_types: ["T cells CD4", "T cells CD8", "Monocytes and Macrophages", "NK cells", "B cells", "Dendritic cells", "PCs"]
      markers: ["PTPRC", "TRAC", "LST1"]
    - name: "epithelial"
      sum_types: ["Epithelial cells"]
      markers: ["EPCAM", "KRT19"]
  marker_sets:
    - type: "T cells CD4"
      markers: ["CC2D2B", "CCR8", "FOXP3", "CD177", "F5", "CCR4", "FAAH2", "KIF18B", "TRAV29DV5", "CD28", "RTKN2", "IL2RA", "C10orf113", "PKIA", "CTLA4", "IL1RL1", "CD40LG", "TRAV2", "ADTRP", "TMPRSS3", "CXCL13", "ZC3H12D", "SGPP2", "FANK1", "PTCHD1", "ICOS", "SIRPG", "CD5", "TNFRSF9", "TNFRSF25"]
